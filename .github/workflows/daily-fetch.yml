name: Daily AI News Fetch

on:
  schedule:
    - cron: '0 7 * * *'   # 7:00 AM UTC every day
  workflow_dispatch:        # lets you trigger it manually from GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push headlines.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch headlines
        run: python scripts/fetch_news.py

      - name: Commit and push updated headlines
        run: |
          git config user.name "Daybreak AI Bot"
          git config user.email "bot@daybreak-ai.com"
          git add data/headlines.json
          git diff --staged --quiet && echo "No new headlines." || (
            git commit -m "chore: update headlines $(date -u +%Y-%m-%d)" &&
            git push
          )
